# fix-agent.yml
# Triggered by the orchestrator (workflow_dispatch) when a developer
# sets the Jira status to "Approved for Fix".
#
# Uses a GitHub Environment "ai-remediation" — configure that environment
# in GitHub → Settings → Environments to require an additional manual
# approval before the job runs (optional second gate at infrastructure level).
#
# Required repository secrets (same set + SNYK_TOKEN for re-scan in validation):
#   GITHUB_TOKEN, GITHUB_MODELS_TOKEN, GITHUB_ORG, GOVERNANCE_REPO,
#   JIRA_URL, JIRA_USER, JIRA_TOKEN, JIRA_PROJECT_KEY, SNYK_TOKEN

name: Fix Agent

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Jira issue key (e.g. VULN-42)"
        required: true
        type: string
      remediation_id:
        description: "UUID from the normalised vulnerability JSON"
        required: true
        type: string
      max_build_retries:
        description: "How many times to ask the LLM to correct a failing build (default: 3)"
        required: false
        type: string
        default: "3"

jobs:
  fix:
    name: Apply remediation and raise PR
    runs-on: ubuntu-latest
    #environment: ai-remediation    # optional manual-approval gate
    # One fix per issue; never run two in parallel for the same issue
    concurrency:
      group: fix-${{ inputs.jira_id }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      models: read 

    steps:
      - name: Checkout vuln-remediation framework
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ORG_NAME }}/vuln-remediation
          token: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install --upgrade -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      # Java must be on PATH for mvn commands inside the Fix Agent
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # The Fix Agent reads .java-version from the cloned target repo;
          # we set a safe default here for the framework checkout itself.
          java-version: "17"

      - name: Install Maven (if not pre-installed on runner)
        run: |
          if ! command -v mvn &>/dev/null; then
            sudo apt-get update -q && sudo apt-get install -y -q maven
          fi
          mvn --version

      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      - name: Run Fix Agent
        env:
          GITHUB_TOKEN:        ${{ secrets.ORG_GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG:          ${{ secrets.ORG_NAME }}
          GOVERNANCE_REPO:     ${{ secrets.GOVERNANCE_REPO }}
          JIRA_URL:            ${{ secrets.JIRA_URL }}
          JIRA_USER:           ${{ secrets.JIRA_USER }}
          JIRA_TOKEN:          ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT_KEY:    ${{ secrets.JIRA_PROJECT_KEY }}
          SNYK_TOKEN:          ${{ secrets.SNYK_TOKEN }}
          MAX_BUILD_RETRIES:   ${{ inputs.max_build_retries || '3' }}
        run: |
          python scripts/agents/fix_agent.py \
            --jira-id        "${{ inputs.jira_id }}" \
            --remediation-id "${{ inputs.remediation_id }}"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fix-agent-logs-${{ inputs.jira_id }}
          path: "*.log"
          retention-days: 14
