# orchestrator-service.yml
# Keeps the Flask webhook listener alive on the self-hosted runner.
# Re-starts it whenever this workflow is manually dispatched, or on a
# scheduled heartbeat every 6 hours.
#
# On the runner the orchestrator runs in the background via nohup.
# For production, use systemd (see README) instead of nohup.

name: Orchestrator Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: "start | stop | restart | status"
        required: true
        type: choice
        options: [start, stop, restart, status]
  schedule:
    # Heartbeat: restart if the process is down (runs every 6 hours)
    - cron: "0 */6 * * *"

jobs:
  manage:
    name: Orchestrator — ${{ inputs.action || 'heartbeat' }}
    runs-on: self-hosted

    steps:
      - name: Checkout vuln-remediation framework
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITHUB_ORG }}/vuln-remediation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Manage orchestrator process
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_ORG:          ${{ secrets.GITHUB_ORG }}
          GOVERNANCE_REPO:     ${{ secrets.GOVERNANCE_REPO }}
          JIRA_URL:            ${{ secrets.JIRA_URL }}
          JIRA_USER:           ${{ secrets.JIRA_USER }}
          JIRA_TOKEN:          ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT_KEY:    ${{ secrets.JIRA_PROJECT_KEY }}
          WEBHOOK_SECRET:      ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_PORT:        ${{ secrets.WEBHOOK_PORT || '8080' }}
        run: |
          ACTION="${{ inputs.action || 'heartbeat' }}"
          PID_FILE="/tmp/orchestrator.pid"
          LOG_FILE="/tmp/orchestrator.log"

          is_running() {
            [ -f "$PID_FILE" ] && kill -0 "$(cat $PID_FILE)" 2>/dev/null
          }

          do_stop() {
            if is_running; then
              kill "$(cat $PID_FILE)" && rm -f "$PID_FILE"
              echo "Orchestrator stopped."
            else
              echo "Orchestrator not running."
            fi
          }

          do_start() {
            if is_running; then
              echo "Orchestrator already running (PID $(cat $PID_FILE))."
            else
              nohup python scripts/orchestrator.py >> "$LOG_FILE" 2>&1 &
              echo $! > "$PID_FILE"
              sleep 2
              if is_running; then
                echo "Orchestrator started (PID $(cat $PID_FILE))."
              else
                echo "ERROR: Orchestrator failed to start. Last 20 lines of log:"
                tail -20 "$LOG_FILE"
                exit 1
              fi
            fi
          }

          case "$ACTION" in
            start)     do_start ;;
            stop)      do_stop ;;
            restart)   do_stop; sleep 1; do_start ;;
            status)
              if is_running; then
                echo "Orchestrator RUNNING (PID $(cat $PID_FILE))"
              else
                echo "Orchestrator STOPPED"
              fi
              ;;
            heartbeat)
              if ! is_running; then
                echo "Heartbeat: orchestrator is down — restarting"
                do_start
              else
                echo "Heartbeat: orchestrator OK (PID $(cat $PID_FILE))"
                # Health check
                curl -sf http://localhost:${WEBHOOK_PORT}/health && echo "Health OK" \
                  || echo "WARNING: health endpoint not responding"
              fi
              ;;
          esac
