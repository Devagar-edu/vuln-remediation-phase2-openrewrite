# exceptions/exceptions.yaml
# Vulnerabilities approved for suppression.
# Only Security Lead may add entries here.
# Each entry must have: vuln_id, reason, approved_by, approved_date, review_date
#
# To add an exception:
#   1. Raise a Security Exception request in Jira
#   2. Get Security Lead approval
#   3. Add the entry below via PR to this governance repo
#   4. Set the Jira issue status to "Excepted"

