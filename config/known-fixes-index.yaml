# known-fixes/index.yaml
# Index of validated fix patterns stored in this directory.
# Each entry maps a Snyk vulnerability ID to its fix file.
# The Fix Agent loads this index to fast-path known CVEs.
#
# To add a new validated fix:
#   1. Create known-fixes/{snyk_id}.yaml with the fix details
#   2. Add an entry to this index
#   3. Open a PR; Security Lead reviews and merges

